<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qubebot - Dashboard</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            padding-top: 24px;
        }

        /* Ambient Glow Background Effect */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 600px;
            background: radial-gradient(circle, rgba(17, 174, 142, 0.08) 0%, rgba(13, 140, 114, 0.02) 50%, rgba(0, 49, 25, 0) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* Dashboard Top Navigation Bar */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 12px 32px;
            max-width: 1200px;
            width: calc(100% - 40px);
            margin: 0 auto;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #121212;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 30px;
        }

        .avatar-placeholder {
            width: 24px;
            height: 24px;
            background-color: #11ae8e;
            border-radius: 50%;
        }

        .user-display {
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
        }

        /* Main Grid Workspace */
        main {
            flex: 1;
            position: relative;
            z-index: 10;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Main Status Wrapper Panel */
        .status-container {
            background-color: #060606;
            border: 1px solid #141414;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 48px 32px;
            text-align: center;
            position: relative;
        }

        /* Border top accent line to draw the eyes */
        .status-container::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #11ae8e, transparent);
        }

        .status-container h1 {
            font-size: 1.5rem;
            color: #a0aec0;
            font-weight: 500;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        /* Glowing In Progress Text badge */
        .progress-badge {
            display: inline-block;
            font-size: 3.5rem;
            font-weight: 800;
            color: #11ae8e;
            letter-spacing: -1px;
            margin-bottom: 16px;
            text-shadow: 0 0 30px rgba(17, 174, 142, 0.4);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        .description {
            font-size: 1rem;
            color: #718096;
            line-height: 1.6;
            max-width: 400px;
            margin: 0 auto 32px auto;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            background-color: #121212;
            color: #a0aec0;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
        }

        .back-home-btn:hover {
            background-color: #171717;
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Subtle pulsing visual animation */
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.9; text-shadow: 0 0 25px rgba(17, 174, 142, 0.3); }
            50% { opacity: 1; text-shadow: 0 0 40px rgba(17, 174, 142, 0.6); }
        }

        @media (max-width: 600px) {
            .progress-badge {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="qube.png" alt="Qube Logo" class="logo">
            <span class="brand-name">qube</span>
        </div>
        
        <div class="profile-area">
            <div class="avatar-placeholder"></div>
            <span class="user-display" id="user-display">@User</span>
        </div>
    </header>

    <main>
        <div class="status-container">
            <h1>YOUR DASHBOARD</h1>
            <div class="progress-badge">In Progress</div>
            <p class="description">
                We are currently building your customization panel layouts. Check back soon for server tracking configurations!
            </p>
            <a href="index.html" class="back-home-btn">‹ Back to Home</a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if login session indicator or exact username is available
            const savedUsername = localStorage.getItem('discord_username');
            const displayElement = document.getElementById('user-display');
            
            if (savedUsername) {
                displayElement.textContent = `@${savedUsername}`;
            } else if (localStorage.getItem('discord_logged_in') === 'true') {
                displayElement.textContent = '@Authorized';
            }
        });
    </script>

</body>
</html>
